name: Deploy to Hetzner

# Triggert nur bei Push auf master, wenn docs/ oder dieser Workflow geändert wurde.
# Verhindert unnötige Deploys bei reinen Code-/Doc-Updates außerhalb von docs/.
on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:  # erlaubt manuellen Trigger via GitHub-UI

jobs:
  deploy:
    name: SSH Deploy zu Hetzner-VPS
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DEPLOY_PATH: ${{ secrets.HETZNER_DEPLOY_PATH }}

    steps:
      - name: Pull on Hetzner via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_PORT || 22 }}
          script_stop: true
          envs: DEPLOY_PATH
          script: |
            set -e
            cd "$DEPLOY_PATH"
            # UTF-8 locale + git config for non-ASCII filenames (CJK/Hangul/Devanagari).
            export LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8
            git config core.quotepath false
            git config core.precomposeunicode true
            echo "→ git fetch"
            git fetch --all --prune
            git reset --hard origin/master
            # NUCLEAR: delete everything in non-ASCII subdirs + all *.html in them
            # then explicitly checkout from HEAD. find -delete handles unicode-named
            # files better than rm -rf when there are encoding-collision duplicates.
            echo "→ pre-state of docs/ja"
            ls -la docs/ja/ 2>&1 | head -20 || true
            echo "→ wiping non-ASCII subdirs (find -delete handles unicode dupes)"
            for dir in docs/ja docs/ko docs/zh-cn docs/zh-tw docs/hi; do
              if [ -d "$dir" ]; then
                find "$dir" -mindepth 1 -delete || true
              fi
            done
            echo "→ post-wipe state of docs/ja (should be empty or sparse)"
            ls -la docs/ja/ 2>&1 | head -10 || true
            echo "→ git checkout HEAD -- docs/{ja,ko,zh-cn,zh-tw,hi}"
            git checkout HEAD -- docs/ja docs/ko docs/zh-cn docs/zh-tw docs/hi
            echo "→ post-checkout file count"
            for dir in docs/ja docs/ko docs/zh-cn docs/zh-tw docs/hi; do
              echo "$dir: $(ls "$dir" 2>/dev/null | wc -l) entries"
            done
            echo "→ JA sample em-dash count at \$DEPLOY_PATH"
            grep -c "—" "docs/ja/位置情報ゲーム.html" 2>&1 || true
            echo "→ pwd + realpath"
            pwd
            realpath "docs/ja/位置情報ゲーム.html" 2>&1 || true
            wc -c "docs/ja/位置情報ゲーム.html" 2>&1 || true
            echo "→ all instances of the JA file on disk"
            find / -name "位置情報ゲーム.html" 2>/dev/null
            echo "→ nginx mapraiders config"
            grep -rl "mapraiders" /etc/nginx/ 2>/dev/null | head -3
            grep -hE "root |alias " /etc/nginx/sites-enabled/* 2>/dev/null | head -10 || true
            echo "→ nginx reload (graceful, kein Downtime)"
            systemctl reload nginx || true
            echo "✓ Deploy fertig: $(git rev-parse --short HEAD)"

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -sI https://mapraiders.com/ | head -1)
          echo "Live-Site: $STATUS"
          if echo "$STATUS" | grep -q "200"; then
            echo "✓ Site live"
          else
            echo "✗ Site nicht erreichbar"
            exit 1
          fi
