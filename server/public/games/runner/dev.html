<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grid Runner — Dev Harness</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0C0914; color: #ECE6F5;
      font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
    #wrap { display: flex; height: 100%; }
    #frameCol { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #toolbar { padding: 8px 12px; background: #161022; display: flex; gap: 8px;
      align-items: center; border-bottom: 1px solid #2a1d44; }
    button { background: #9D4EDD; color: #0C0914; border: 0; padding: 8px 14px;
      border-radius: 8px; font-weight: 700; cursor: pointer; }
    button.alt { background: #161022; color: #ECE6F5; border: 1px solid #9D4EDD; }
    iframe { flex: 1; border: 0; width: 100%; }
    #log { width: 360px; background: #0a0712; border-left: 1px solid #2a1d44;
      padding: 10px; overflow: auto; font: 12px/1.5 ui-monospace, Menlo, Consolas, monospace; }
    #log h3 { margin: 0 0 8px; color: #FFB300; font-size: 13px; }
    .entry { border-bottom: 1px solid #1c1430; padding: 6px 0; white-space: pre-wrap;
      word-break: break-word; }
    .entry .ty { color: #9D4EDD; font-weight: 700; }
    .frame-phone { max-width: 420px; margin: 0 auto; box-shadow: 0 0 40px #000; }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="frameCol">
      <div id="toolbar">
        <button id="initBtn">Send runner:init</button>
        <button id="reloadBtn" class="alt">Reload iframe</button>
        <button id="phoneBtn" class="alt">Phone size</button>
        <span id="status" style="opacity:.7;font-size:12px;">waiting…</span>
      </div>
      <iframe id="frame" src="index.html" allow="autoplay"></iframe>
    </div>
    <div id="log">
      <h3>HOST LOG</h3>
      <div id="entries"></div>
    </div>
  </div>
  <script src="dev.js"></script>
</body>
</html>
